<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Memory & Time Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #000000);
            min-height: 100vh;
            color: white;
        }

        .mono { font-family: 'JetBrains+Mono', monospace; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .time-unit {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.25rem 0.75rem;
            border-radius: 16px;
            text-align: center;
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }

        .exam-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .exam-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(59, 130, 246, 0.5);
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col items-center py-10 px-4">

    <div class="max-w-4xl w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Left Column: Inputs and Main Display -->
        <div class="lg:col-span-2 space-y-6">
            <div class="space-y-2">
                <h1 class="text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">
                    Exam Countdown
                </h1>
                <p class="text-gray-400 text-sm">Precision tracking for your academic milestones.</p>
            </div>

            <!-- Configuration Card -->
            <div class="glass-card p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-2 tracking-wider">Exam Name</label>
                        <input type="text" id="examName" placeholder="e.g., Finals: Mathematics" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-2 tracking-wider">Date & Time</label>
                        <input type="datetime-local" id="dateInput" 
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="startTracking()" 
                        class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                        Start Timer
                    </button>
                    <button onclick="saveExam()" 
                        class="px-6 bg-white/10 hover:bg-white/20 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                        Save to Memory
                    </button>
                </div>
            </div>

            <!-- Active Countdown Card -->
            <div id="resultCard" class="glass-card p-8 hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="text-center mb-8">
                    <span id="statusBadge" class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] border mb-4 inline-block">
                        ACTIVE
                    </span>
                    <h2 id="displayTitle" class="text-2xl font-bold text-white mb-1">Exam</h2>
                    <p id="targetText" class="text-sm font-medium text-gray-400"></p>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="time-unit">
                        <div id="days" class="text-3xl font-bold mono">00</div>
                        <div class="text-[10px] uppercase font-bold tracking-widest text-gray-500 mt-2">Days</div>
                    </div>
                    <div class="time-unit">
                        <div id="hours" class="text-3xl font-bold mono">00</div>
                        <div class="text-[10px] uppercase font-bold tracking-widest text-gray-500 mt-2">Hours</div>
                    </div>
                    <div class="time-unit">
                        <div id="minutes" class="text-3xl font-bold mono">00</div>
                        <div class="text-[10px] uppercase font-bold tracking-widest text-gray-500 mt-2">Mins</div>
                    </div>
                    <div class="time-unit border-blue-500/50">
                        <div id="seconds" class="text-3xl font-bold mono text-blue-400">00</div>
                        <div class="text-[10px] uppercase font-bold tracking-widest text-gray-500 mt-2">Secs</div>
                    </div>
                </div>

                <div id="totalSection" class="mt-8 pt-6 border-t border-white/5 flex flex-wrap justify-center gap-6 text-[11px] text-gray-500 font-bold uppercase tracking-widest">
                    <div>Total Hours: <span id="totalHours" class="text-white mono ml-1">0</span></div>
                    <div>Total Seconds: <span id="totalSeconds" class="text-white mono ml-1">0</span></div>
                </div>
            </div>
        </div>

        <!-- Right Column: Memory Sidebar -->
        <div class="space-y-4">
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-[0.2em] px-2">Memory Bank</h3>
            <div id="memoryList" class="space-y-3 max-h-[70vh] overflow-y-auto custom-scroll pr-2">
                <!-- Memory items injected here -->
                <div class="text-center py-10 text-gray-600 text-sm italic">
                    No saved exams yet
                </div>
            </div>
        </div>

    </div>

    <script>
        let intervalId = null;
        let savedExams = JSON.parse(localStorage.getItem('exam_memory') || '[]');

        // Set default value to now + 7 days
        window.onload = () => {
            const now = new Date();
            now.setDate(now.getDate() + 7);
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('dateInput').value = now.toISOString().slice(0, 16);
            renderMemory();
        };

        function saveExam() {
            const name = document.getElementById('examName').value || "Unnamed Exam";
            const date = document.getElementById('dateInput').value;

            if (!date) return;

            const newExam = {
                id: Date.now(),
                name: name,
                date: date
            };

            savedExams.unshift(newExam);
            localStorage.setItem('exam_memory', JSON.stringify(savedExams));
            renderMemory();
            
            // Highlight the first item momentarily
            startTracking(newExam.name, newExam.date);
        }

        function deleteExam(id, event) {
            event.stopPropagation();
            savedExams = savedExams.filter(exam => exam.id !== id);
            localStorage.setItem('exam_memory', JSON.stringify(savedExams));
            renderMemory();
        }

        function renderMemory() {
            const list = document.getElementById('memoryList');
            if (savedExams.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-gray-600 text-sm italic">No saved exams yet</div>';
                return;
            }

            list.innerHTML = savedExams.map(exam => {
                const target = new Date(exam.date);
                const isPast = target < new Date();
                return `
                    <div onclick="startTracking('${exam.name.replace(/'/g, "\\'")}', '${exam.date}')" 
                         class="exam-item p-4 rounded-2xl cursor-pointer relative group">
                        <button onclick="deleteExam(${exam.id}, event)" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"/></svg>
                        </button>
                        <div class="text-xs font-bold ${isPast ? 'text-gray-500' : 'text-blue-400'} mb-1 uppercase tracking-tighter">
                            ${isPast ? 'Passed' : 'Upcoming'}
                        </div>
                        <div class="font-bold text-white truncate pr-6">${exam.name}</div>
                        <div class="text-[10px] text-gray-500 mono mt-1">${new Date(exam.date).toLocaleString()}</div>
                    </div>
                `;
            }).join('');
        }

        function startTracking(customName, customDate) {
            const nameInput = document.getElementById('examName');
            const dateInput = document.getElementById('dateInput');
            
            // If values passed from memory click, update inputs
            if (customName) nameInput.value = customName;
            if (customDate) dateInput.value = customDate;

            const name = nameInput.value || "Exam Timer";
            const input = dateInput.value;
            if (!input) return;

            const targetDate = new Date(input);
            if (intervalId) clearInterval(intervalId);
            
            const resultCard = document.getElementById('resultCard');
            resultCard.classList.remove('hidden');
            document.getElementById('displayTitle').innerText = name;

            const update = () => {
                const now = new Date();
                const diff = targetDate - now;
                const isPast = diff < 0;
                const absDiff = Math.abs(diff);

                const seconds = Math.floor(absDiff / 1000) % 60;
                const minutes = Math.floor(absDiff / (1000 * 60)) % 60;
                const hours = Math.floor(absDiff / (1000 * 60 * 60)) % 24;
                const days = Math.floor(absDiff / (1000 * 60 * 60 * 24));

                const totalSecs = Math.floor(absDiff / 1000);
                const totalHrs = Math.floor(absDiff / (1000 * 60 * 60));

                document.getElementById('days').innerText = days.toString().padStart(2, '0');
                document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
                document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
                document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');

                document.getElementById('totalSeconds').innerText = totalSecs.toLocaleString();
                document.getElementById('totalHours').innerText = totalHrs.toLocaleString();

                const statusBadge = document.getElementById('statusBadge');
                const targetText = document.getElementById('targetText');

                if (isPast) {
                    statusBadge.innerText = "Time Since Exam";
                    statusBadge.className = "px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] border border-purple-500/50 text-purple-400 mb-4 inline-block bg-purple-500/10";
                } else {
                    statusBadge.innerText = "Remaining Time";
                    statusBadge.className = "px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.2em] border border-emerald-500/50 text-emerald-400 mb-4 inline-block bg-emerald-500/10";
                }
                targetText.innerText = targetDate.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            };

            update();
            intervalId = setInterval(update, 1000);
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
